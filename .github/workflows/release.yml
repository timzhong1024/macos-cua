name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          swift --version
          uname -a

      - name: Run tests
        run: |
          swift test

      - name: Build release binary
        run: |
          TAG="${GITHUB_REF_NAME}"
          BINARY_BASENAME="macos-cua-${TAG}-darwin-${{ matrix.arch }}"

          swift build -c release --product macos-cua
          BIN_DIR="$(swift build -c release --show-bin-path)"
          install -d dist
          install -m 755 "${BIN_DIR}/macos-cua" "dist/${BINARY_BASENAME}"
          shasum -a 256 "dist/${BINARY_BASENAME}" > "dist/${BINARY_BASENAME}.sha256"
          echo "BINARY_BASENAME=${BINARY_BASENAME}" >> "${GITHUB_ENV}"

      - name: Upload release binary
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_BASENAME }}
          path: |
            dist/${{ env.BINARY_BASENAME }}
            dist/${{ env.BINARY_BASENAME }}.sha256
          if-no-files-found: error

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build-macos
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: macos-cua-${{ github.ref_name }}-darwin-*
          merge-multiple: true
          path: release-assets

      - name: Show release assets
        run: |
          ls -l release-assets
          FILE_COUNT="$(find release-assets -maxdepth 1 -type f | wc -l | tr -d ' ')"
          test "${FILE_COUNT}" -eq 4

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          SHORT_SHA="${GITHUB_SHA::7}"
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"

          cat > "${NOTES_FILE}" <<EOF
          Automated release for \`${TAG}\`.

          Assets:
          - \`macos-cua-${TAG}-darwin-arm64\`
          - \`macos-cua-${TAG}-darwin-arm64.sha256\`
          - \`macos-cua-${TAG}-darwin-x86_64\`
          - \`macos-cua-${TAG}-darwin-x86_64.sha256\`

          Built from commit \`${SHORT_SHA}\`.
          EOF

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" release-assets/* --clobber
          else
            gh release create "${TAG}" release-assets/* \
              --title "${TAG}" \
              --notes-file "${NOTES_FILE}" \
              --target "${GITHUB_SHA}"
          fi

  publish-npm:
    name: Publish npm
    runs-on: macos-15
    needs: publish-release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify npm package version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p 'require("./npm/package.json").version')"
          test "${TAG_VERSION}" = "${PACKAGE_VERSION}"

      - name: Build npm package
        run: |
          ./scripts/build-npm-package.sh

      - name: Publish npm package
        run: |
          npm publish ./npm --access public
